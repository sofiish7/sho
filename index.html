<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sho</title>
    <style>
        body {
            background-color: #f0f8ff;
            text-align: center;
            font-family: 'Arial', sans-serif;
        }
        h1 {
            color: #ff6347;
        }
        p {
            color: #4682b4;
        }
        .cake {
            margin: 20px auto;
            width: 300px;
            height: 300px;
            background-color: #ffe4e1;
            border: 5px solid #cd5c5c;
            border-radius: 50%;
            position: relative;
        }
        .candle {
            width: 5px;
            height: 20px;
            background-color: #ffd700;
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <h1>Happy Birthday, Sho!</h1>
    <p>Wishing you a day filled with love and cheer!</p>
    <div class="cake">
        <div class="candle" style="left: 20%;"></div>
        <div class="candle" style="left: 50%;"></div>
        <div class="candle" style="left: 80%;"></div>
    </div>
</body>
</html>
